openapi: 3.0.0
info:
  title: Bank API Test Harness
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local test environment
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PaymentResponse:
      type: object
      properties:
        payment_id:
          type: string
        status:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
security:
  - BearerAuth: []
paths:
  /api/v1/payments:
    post:
      operationId: initiatePayment
      summary: Initiate payment
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, beneficiary_account, currency, payment_reference]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  multipleOf: 0.01
                beneficiary_account:
                  type: string
                  minLength: 8
                  maxLength: 34
                currency:
                  type: string
                  enum: [ZAR, USD, EUR, GBP]
                payment_reference:
                  type: string
                  minLength: 1
                  maxLength: 35
                description:
                  type: string
      responses:
        "201":
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'