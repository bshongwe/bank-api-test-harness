openapi: 3.0.0
info:
  title: Bank API Test Harness
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/payments:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, beneficiary_account, currency, payment_reference]
              properties:
                amount:
                  type: number
                beneficiary_account:
                  type: string
                currency:
                  type: string
                  enum: [ZAR, USD, EUR, GBP]
                payment_reference:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Payment initiated
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "422":
          description: Validation error
        "500":
          description: Server error