name: Bank API Test Harness

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Start WireMock
        run: docker compose up -d

      - name: Wait for WireMock
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8080/__admin/health; do sleep 1; done'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run payment flow tests
        run: k6 run tests/performance/payment-flow.test.js

      - name: Run audit log tests
        run: k6 run tests/performance/audit-log.test.js

      - name: Run retry backoff tests
        run: k6 run tests/performance/retry-backoff.test.js

      - name: Stop WireMock
        if: always()
        run: docker compose down
